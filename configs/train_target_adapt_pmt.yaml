pmt_type: 'Data' #, 'Data' #'Domain' 'Spatial', None
train_type: 'LSET1' #pmt | LSET1 | pmtinc | All | besideLSET1 | LSET1wodown3 | LSET1wodown23
pmt_size: 256
es_step: 10 #5
resume_dir: ''
continue_train: False
total_epochs: 1

random_seed: 999
organ_list:
- 'Liver'
- 'R.Kidney'
- 'L.Kidney'
- 'Spleen'
# ---------
# - 'AA'
# - 'LAC'
# - 'LVC'
# - 'MYO'
# ---------
# - 'Tumor'

# Dataloader Setting
patient_level_dataloader: False
img_size:
- 240
- 240
batch_size: 16
num_workers: 8

# Model 
arch: 'Pmt_UNet' # Pmt_DeepLab | UNet
use_prototype: False
update_prototype: False
input_dim: 3
feat_dim: 32
output_dim: 64
num_classes: 2
num_prototypes: 1

# Loss parameters
nav_t: 1
beta: 0.001
s_par: 0.5
dice_ignore_index: -1
# display
save_steps: 500
eval_steps: 2
display_steps: 20
save_visuals: True

# test
test: False
